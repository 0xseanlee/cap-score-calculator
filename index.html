    // Functions to convert questions to grades
    function getChineseGrade(q) {
        if (q >= 40) return 'A++';
        if (q >= 39) return 'A+';
        if (q >= 36) return 'A';
        if (q >= 32) return 'B++';
        if (q >= 28) return 'B+';
        if (q >= 17) return 'B';
        return 'C';
    }

    function getSocialGrade(q) {
        if (q >= 52) return 'A++';
        if (q >= 51) return 'A+';
        if (q >= 48) return 'A';
        if (q >= 41) return 'B++';
        if (q >= 34) return 'B+';
        if (q >= 20) return 'B';
        return 'C';
    }

    function getScienceGrade(q) {
        if (q >= 47) return 'A++';
        if (q >= 46) return 'A+';
        if (q >= 43) return 'A';
        if (q >= 36) return 'B++';
        if (q >= 29) return 'B+';
        if (q >= 19) return 'B';
        return 'C';
    }

    function getMathGrade(mc, nc) {
        let weightedScore = (mc / 25) * 85 + (nc / 6) * 15;
        // Handling floating point precision for range comparisons
        weightedScore = Math.round(weightedScore * 100) / 100;
        
        if (weightedScore >= 91.60) return 'A++';
        if (weightedScore >= 85.70) return 'A+';
        if (weightedScore >= 77.10) return 'A';
        if (weightedScore >= 68.70) return 'B++';
        if (weightedScore >= 59.40) return 'B+';
        if (weightedScore >= 39.00) return 'B';
        return 'C';
    }

    function getEnglishGrade(read, listen) {
        let weightedScore = (read / 43) * 80 + (listen / 21) * 20;
        weightedScore = Math.round(weightedScore * 100) / 100;

        if (weightedScore >= 98.14) return 'A++';
        if (weightedScore >= 96.28) return 'A+';
        if (weightedScore >= 90.70) return 'A';
        if (weightedScore >= 82.30) return 'B++';
        if (weightedScore >= 69.28) return 'B+';
        if (weightedScore >= 38.43) return 'B';
        return 'C';
    }

    function calculateAndRecommend() {
        const errorMsg = document.getElementById('error-message');
        errorMsg.classList.add('hidden');
        errorMsg.innerText = '';

        let totalScore = 0;
        let cGrade, mGrade, eGrade, soGrade, scGrade;

        try {
            if (currentMode === 'grade') {
                totalScore += parseFloat(document.getElementById('grade-chinese').value);
                totalScore += parseFloat(document.getElementById('grade-math').value);
                totalScore += parseFloat(document.getElementById('grade-english').value);
                totalScore += parseFloat(document.getElementById('grade-social').value);
                totalScore += parseFloat(document.getElementById('grade-science').value);
                totalScore += parseFloat(document.getElementById('grade-writing').value);
                
                document.getElementById('converted-grades-display').classList.add('hidden');
            } else {
                // Read questions
                const qChi = parseInt(document.getElementById('q-chinese').value || 0);
                const qSoc = parseInt(document.getElementById('q-social').value || 0);
                const qSci = parseInt(document.getElementById('q-science').value || 0);
                const qMathMc = parseInt(document.getElementById('q-math-mc').value || 0);
                const qMathNc = parseInt(document.getElementById('q-math-nc').value || 0);
                const qEngRead = parseInt(document.getElementById('q-eng-read').value || 0);
                const qEngList = parseInt(document.getElementById('q-eng-listen').value || 0);
                const wScore = parseFloat(document.getElementById('q-writing').value);

                // Validations
                if(qChi > 42 || qSoc > 54 || qSci > 50 || qMathMc > 25 || qMathNc > 6 || qEngRead > 43 || qEngList > 21) {
                    throw new Error("輸入的題數超過該科滿分題數，請重新確認！");
                }
                if(qChi < 0 || qSoc < 0 || qSci < 0 || qMathMc < 0 || qMathNc < 0 || qEngRead < 0 || qEngList < 0) {
                    throw new Error("題數不能為負數！");
                }

                cGrade = getChineseGrade(qChi);
                soGrade = getSocialGrade(qSoc);
                scGrade = getScienceGrade(qSci);
                mGrade = getMathGrade(qMathMc, qMathNc);
                eGrade = getEnglishGrade(qEngRead, qEngList);

                // Display grades
                document.getElementById('res-c').innerText = cGrade;
                document.getElementById('res-e').innerText = eGrade;
                document.getElementById('res-m').innerText = mGrade;
                document.getElementById('res-so').innerText = soGrade;
                document.getElementById('res-sc').innerText = scGrade;
                document.getElementById('converted-grades-display').classList.remove('hidden');

                // Sum
                totalScore = gradePoints[cGrade] + gradePoints[mGrade] + gradePoints[eGrade] + 
                             gradePoints[soGrade] + gradePoints[scGrade] + wScore;
            }

            // Update UI Score
            // Fix formatting to handle things like 35.8 or 36
            let formattedScore = totalScore % 1 === 0 ? totalScore + ".0" : totalScore.toFixed(1);
            
            // Writing score has .1, .2, .4, .6, .8
            if(totalScore.toString().length > 4) {
                 formattedScore = totalScore.toFixed(1); // prevent 34.000000004
            }

            document.getElementById('final-score').innerText = formattedScore;

            // Sort and Distribute Schools
            distributeSchools(totalScore);

            // Show Results
            document.getElementById('results-section').classList.remove('hidden');
            
            // Scroll to results smoothly
            setTimeout(() => {
                document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

        } catch (e) {
            errorMsg.innerText = e.message;
            errorMsg.classList.remove('hidden');
        }
    }

    function createSchoolCard(school) {
        const typeColors = {
            'normal': 'bg-blue-100 text-blue-800 border-blue-200',
            'vocational': 'bg-orange-100 text-orange-800 border-orange-200',
            'under': 'bg-gray-100 text-gray-700 border-gray-200'
        };
        const typeText = {
            'normal': '普通',
            'vocational': '技職',
            'under': '免試'
        };

        const colorClass = typeColors[school.type];
        
        return `
            <div class="border rounded-xl p-4 hover:shadow-md transition-shadow bg-white flex justify-between items-center">
                <div>
                    <div class="font-bold text-gray-800 text-lg">${school.name}</div>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded ${colorClass}">${typeText[school.type]}</span>
                </div>
                <div class="text-right">
                    <div class="text-xs text-gray-500 mb-1">參考分數</div>
                    <div class="font-black text-indigo-600">${school.displayScore}</div>
                </div>
            </div>
        `;
    }

    function distributeSchools(score) {
        const dream = [];
        const target = [];
        const safe = [];

        schools.forEach(school => {
            if (school.type === 'under') {
                safe.push(school); // Always safe
            } else {
                // Using min score for calculation
                const diff = score - school.score;

                if (diff >= 0 && diff < 2.0) {
                    target.push(school); // Score is enough, up to 2 points higher
                } else if (diff >= 2.0) {
                    safe.push(school);   // Score is significantly higher
                } else if (diff < 0 && diff >= -1.0) {
                    dream.push(school);  // Score is lower by at most 1 point
                }
            }
        });

        // Sort descending by score
        target.sort((a, b) => b.score - a.score);
        dream.sort((a, b) => b.score - a.score);
        safe.sort((a, b) => b.score - a.score);

        // Render
        const dreamContainer = document.getElementById('list-dream');
        const targetContainer = document.getElementById('list-target');
        const safeContainer = document.getElementById('list-safe');

        dreamContainer.innerHTML = dream.length > 0 
            ? dream.map(createSchoolCard).join('') 
            : `<div class="col-span-full text-gray-400 italic py-2 text-sm">無相近區間的夢幻志願。</div>`;
            
        targetContainer.innerHTML = target.length > 0 
            ? target.map(createSchoolCard).join('') 
            : `<div class="col-span-full text-gray-400 italic py-2 text-sm">此區間目前無對應學校。</div>`;
            
        safeContainer.innerHTML = safe.map(createSchoolCard).join('');
    }

    switchTab('grade');
