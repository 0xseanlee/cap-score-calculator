        { name: "基隆中山高中", score: 0, type: "under", displayScore: "不足額" },
        { name: "基隆八斗高中", score: 0, type: "under", displayScore: "不足額" },
        { name: "雙溪高中", score: 0, type: "under", displayScore: "不足額" },
        { name: "金山高中", score: 0, type: "under", displayScore: "不足額" }
    ];

    function getChineseGrade(q) {
        return q >= 40 ? 'A++' : q >= 39 ? 'A+' : q >= 36 ? 'A' : q >= 32 ? 'B++' : q >= 28 ? 'B+' : q >= 17 ? 'B' : 'C';
    }
    function getSocialGrade(q) {
        return q >= 52 ? 'A++' : q >= 51 ? 'A+' : q >= 48 ? 'A' : q >= 41 ? 'B++' : q >= 34 ? 'B+' : q >= 20 ? 'B' : 'C';
    }
    function getScienceGrade(q) {
        return q >= 47 ? 'A++' : q >= 46 ? 'A+' : q >= 43 ? 'A' : q >= 36 ? 'B++' : q >= 29 ? 'B+' : q >= 19 ? 'B' : 'C';
    }
    function getMathGrade(mc, nc) {
        let score = Math.round(((mc / 25) * 85 + (nc / 6) * 15) * 100) / 100;
        return score >= 91.6 ? 'A++' : score >= 85.7 ? 'A+' : score >= 77.1 ? 'A' : score >= 68.7 ? 'B++' : score >= 59.4 ? 'B+' : score >= 39 ? 'B' : 'C';
    }
    function getEnglishGrade(read, listen) {
        let score = Math.round(((read / 43) * 80 + (listen / 21) * 20) * 100) / 100;
        return score >= 98.14 ? 'A++' : score >= 96.28 ? 'A+' : score >= 90.7 ? 'A' : score >= 82.3 ? 'B++' : score >= 69.28 ? 'B+' : score >= 38.43 ? 'B' : 'C';
    }

    function calculateAndRecommend() {
        const errorMsg = document.getElementById('error-message');
        errorMsg.classList.add('hidden');
        errorMsg.innerText = '';
        let totalScore = 0, cGrade, mGrade, eGrade, soGrade, scGrade;

        try {
            if (currentMode === 'grade') {
                totalScore += parseFloat(document.getElementById('grade-chinese').value);
                totalScore += parseFloat(document.getElementById('grade-math').value);
                totalScore += parseFloat(document.getElementById('grade-english').value);
                totalScore += parseFloat(document.getElementById('grade-social').value);
                totalScore += parseFloat(document.getElementById('grade-science').value);
                totalScore += parseFloat(document.getElementById('grade-writing').value);
                document.getElementById('converted-grades-display').classList.add('hidden');
            } else {
                const qChi = parseInt(document.getElementById('q-chinese').value || 0),
                      qSoc = parseInt(document.getElementById('q-social').value || 0),
                      qSci = parseInt(document.getElementById('q-science').value || 0),
                      qMathMc = parseInt(document.getElementById('q-math-mc').value || 0),
                      qMathNc = parseInt(document.getElementById('q-math-nc').value || 0),
                      qEngRead = parseInt(document.getElementById('q-eng-read').value || 0),
                      qEngList = parseInt(document.getElementById('q-eng-listen').value || 0),
                      wScore = parseFloat(document.getElementById('q-writing').value);

                if(qChi > 42 || qSoc > 54 || qSci > 50 || qMathMc > 25 || qMathNc > 6 || qEngRead > 43 || qEngList > 21) throw new Error("輸入的題數超過該科滿分題數！");
                if(qChi < 0 || qSoc < 0 || qSci < 0 || qMathMc < 0 || qMathNc < 0 || qEngRead < 0 || qEngList < 0) throw new Error("題數不能為負數！");

                cGrade = getChineseGrade(qChi); soGrade = getSocialGrade(qSoc); scGrade = getScienceGrade(qSci);
                mGrade = getMathGrade(qMathMc, qMathNc); eGrade = getEnglishGrade(qEngRead, qEngList);

                ['c', 'e', 'm', 'so', 'sc'].forEach((id, i) => {
                    document.getElementById(`res-${id}`).innerText = [cGrade, eGrade, mGrade, soGrade, scGrade][i];
                });
                document.getElementById('converted-grades-display').classList.remove('hidden');
                totalScore = gradePoints[cGrade] + gradePoints[mGrade] + gradePoints[eGrade] + gradePoints[soGrade] + gradePoints[scGrade] + wScore;
            }

            document.getElementById('final-score').innerText = totalScore.toFixed(1);
            distributeSchools(totalScore);
            document.getElementById('results-section').classList.remove('hidden');
            setTimeout(() => document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        } catch (e) {
            errorMsg.innerText = e.message;
            errorMsg.classList.remove('hidden');
        }
    }

    function createSchoolCard(school) {
        const colors = { 'normal': 'bg-blue-100 text-blue-800 border-blue-200', 'vocational': 'bg-orange-100 text-orange-800 border-orange-200', 'under': 'bg-gray-100 text-gray-700 border-gray-200' },
              texts = { 'normal': '普通', 'vocational': '技職', 'under': '免試' };
        return `
            <div class="border rounded-xl p-4 hover:shadow-md transition-shadow bg-white flex justify-between items-center">
                <div>
                    <div class="font-bold text-gray-800 text-lg">${school.name}</div>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded ${colors[school.type]}">${texts[school.type]}</span>
                </div>
                <div class="text-right">
                    <div class="text-xs text-gray-500 mb-1">參考分數</div>
                    <div class="font-black text-indigo-600">${school.displayScore}</div>
                </div>
            </div>`;
    }

    function distributeSchools(score) {
        const dream = [], target = [], safe = [];
        schools.forEach(school => {
            if (school.type === 'under') { safe.push(school); } 
            else {
                const diff = score - school.score;
                if (diff >= 0 && diff < 2.0) target.push(school);
                else if (diff >= 2.0) safe.push(school);
                else if (diff < 0 && diff >= -1.0) dream.push(school);
            }
        });

        const sortFn = (a, b) => b.score - a.score;
        document.getElementById('list-dream').innerHTML = dream.length ? dream.sort(sortFn).map(createSchoolCard).join('') : `<div class="col-span-full text-gray-400 italic py-2 text-sm">無相近區間的夢幻志願。</div>`;
        document.getElementById('list-target').innerHTML = target.length ? target.sort(sortFn).map(createSchoolCard).join('') : `<div class="col-span-full text-gray-400 italic py-2 text-sm">此區間目前無對應學校。</div>`;
        document.getElementById('list-safe').innerHTML = safe.sort(sortFn).map(createSchoolCard).join('');
    }

    switchTab('grade');
</script>
</body>
